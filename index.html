<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="theme-color" content="#11304A" />

    <title>Searah</title>
    <meta
      name="description"
      content="Searah is an upstream oil and gas joint venture between Eni and PETRONAS, operating 19 assets across Indonesia and Malaysia."
    />

    <!-- The hero image is the LCP element; fetch it in parallel with the JS bundle. The
         srcset mirrors <Image>, so the preload matches the variant the browser picks
         (~13 KB on a phone) instead of racing it with a second, larger download. -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      imagesrcset="/media/offshore-platform-480.webp 480w, /media/offshore-platform-960.webp 960w, /media/offshore-platform-1600.webp 1600w"
      imagesizes="100vw"
      fetchpriority="high"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
